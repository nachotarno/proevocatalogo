<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROEVO - Gestión de Repuestos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .grid-bg { 
            background-image: radial-gradient(#222 1px, transparent 1px); 
            background-size: 30px 30px; 
        }
        .card-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .proevo-gradient { background: linear-gradient(135deg, #ea580c 0%, #f59e0b 100%); }
        .catalog-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .catalog-card:hover { transform: translateY(-5px); border-color: #ea580c; }
        .proevo-logo { 
            filter: invert(100%) brightness(120%) drop-shadow(0 4px 6px rgba(0,0,0,0.3)); 
            max-height: 2.5rem;
            width: auto;
        }
    </style>
</head>
<body class="bg-[#0f0f0f] text-zinc-200 selection:bg-orange-500/30 grid-bg">

<div class="min-h-screen flex flex-col md:flex-row">
    <aside class="w-full md:w-24 lg:w-72 flex-shrink-0 bg-[#151515]/80 backdrop-blur-xl border-r border-white/5 flex md:flex-col p-6 z-20 gap-8">
        <div class="flex items-center gap-4 justify-center md:justify-start">
            <img src="/static/logo-proevo.png" alt="Logo PROEVO" class="proevo-logo h-10 w-auto"> 
            <div class="hidden lg:block">
                <p class="text-[10px] text-orange-500 uppercase font-black tracking-[0.2em]">Maintenance AI</p>
            </div>
        </div>

        <nav class="flex md:flex-col gap-3 w-full">
            <button class="flex items-center gap-4 p-4 rounded-2xl bg-white/5 text-white border border-white/10 hover:bg-white/10 transition-all w-full">
                <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="hidden lg:block font-semibold">Dashboard</span>
            </button>
            <button class="flex items-center gap-4 p-4 rounded-2xl text-zinc-400 hover:text-white hover:bg-white/5 transition-all w-full">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span class="hidden lg:block font-semibold">Catálogo</span>
            </button>
        </nav>

        <div class="mt-auto hidden lg:block bg-orange-500/5 border border-orange-500/10 rounded-2xl p-5">
            <p class="text-[10px] uppercase font-bold text-orange-500 mb-3 tracking-widest">Sistema Activo</p>
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                <span class="text-xs font-medium text-zinc-400">Motor IA Listo</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="p-8 border-b border-white/5 bg-[#151515]/40">
            <div class="max-w-4xl">
                <h2 class="text-sm font-black text-orange-500 uppercase tracking-[0.3em] mb-4">Módulo de Limpieza Visual</h2>
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1 relative group">
                        <input type="file" id="fileInput" class="hidden" onchange="document.getElementById('fileNameDisplay').innerText = this.files[0].name">
                        <label for="fileInput" class="flex items-center gap-4 p-4 bg-[#1a1a1a] border-2 border-dashed border-zinc-800 rounded-2xl cursor-pointer group-hover:border-orange-500/50 transition-all">
                            <div class="w-12 h-12 rounded-xl bg-zinc-900 flex items-center justify-center text-zinc-500 group-hover:text-orange-500 transition-colors">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-zinc-300" id="fileNameDisplay">Subir nuevo repuesto</p>
                                <p class="text-[11px] text-zinc-600 font-medium">Click para seleccionar archivo</p>
                            </div>
                        </label>
                    </div>
                    <button onclick="procesarImagen()" class="proevo-gradient px-8 py-4 rounded-2xl text-white font-extrabold text-xs uppercase tracking-widest shadow-xl shadow-orange-900/20 hover:scale-105 active:scale-95 transition-all">
                        Procesar Imagen
                    </button>
                </div>
            </div>
        </header>

        <section class="p-8">
            <div class="flex items-end justify-between mb-10">
                <div>
                    <h3 class="text-4xl font-extrabold text-white tracking-tight">Catálogo</h3>
                    <p class="text-zinc-500 mt-2 font-medium">Repuestos con fondo transparente listos para la venta.</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="buscarCatalogo" placeholder="Filtrar repuesto..." class="bg-zinc-900 border border-white/5 rounded-xl px-5 py-3 text-sm focus:outline-none focus:border-orange-500/50 transition-all">
                </div>
            </div>

            <div id="catalogoImagenes" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-8"></div>
        </section>
    </main>
</div>

<script src="/static/script.js"></script>
</body>
</html>
