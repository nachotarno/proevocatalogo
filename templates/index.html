<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6">

<h1 class="text-2xl mb-6">CATÁLOGO PROEVO</h1>

<form action="/upload" method="post" enctype="multipart/form-data">
<input type="file" name="file" multiple class="mb-4">
<button class="bg-yellow-500 px-4 py-2">SUBIR</button>
</form>

<a href="/export" class="block my-4 text-green-400">EXPORTAR PDF</a>

<div class="grid grid-cols-3 gap-6">

{% for p in productos %}
<div class="bg-zinc-900 p-4">

<img src="{{ url_for('static', filename='processed/' + p[5]) }}">

<p>{{ p[2] }}</p>
<p class="text-sm text-gray-400">{{ p[3] }}</p>

<form action="/precio/{{p[0]}}" method="post">
<input name="precio" placeholder="Precio" value="{{p[4]}}" class="text-black w-full">
<button class="bg-blue-500 w-full mt-2">Guardar</button>
</form>

<a href="/download/{{p[5]}}" class="block mt-2 text-green-400">Descargar</a>
<a href="/delete/{{p[0]}}" class="block text-red-400">Eliminar</a>

</div>
{% endfor %}

</div>

</body>
</html>
